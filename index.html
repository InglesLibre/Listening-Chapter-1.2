<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listening Part 1 | Multiple Choice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f3faf0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1.2rem;
      color: #1d3e1d;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .header {
      background: white;
      border-radius: 28px;
      padding: 1.2rem 1.8rem;
      margin-bottom: 1.8rem;
      border: 1px solid #d4e8d4;
    }
    h1 { font-size: 1.7rem; color: #2c6b2c; display: flex; align-items: center; gap: 10px; }
    h1::before { content: "🎧"; font-size: 1.8rem; }
    .sub { color: #4e724e; font-size: 0.9rem; border-left: 3px solid #9bcf9b; padding-left: 14px; margin-top: 8px; }
    .audio-card {
      background: white;
      border-radius: 40px;
      padding: 0.9rem 1.5rem;
      margin-bottom: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      border: 1px solid #cae3ca;
    }
    .audio-label { font-weight: 600; background: #eaf5ea; padding: 6px 14px; border-radius: 60px; font-size: 0.8rem; }
    audio { min-width: 240px; max-width: 100%; border-radius: 60px; }
    .questions-grid { display: flex; flex-direction: column; gap: 1.3rem; }
    .question-card {
      background: white;
      border-radius: 28px;
      padding: 1.2rem 1.6rem;
      border: 1px solid #cde0cd;
    }
    .question-number { background: #e0f0e0; color: #2b6b2b; font-weight: 700; font-size: 0.75rem; padding: 4px 12px; border-radius: 40px; display: inline-block; margin-bottom: 12px; }
    .question-text { font-weight: 600; margin-bottom: 1rem; color: #1b431b; }
    .options { display: flex; flex-direction: column; gap: 10px; padding-left: 6px; }
    .option { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; padding: 8px 10px; border-radius: 60px; }
    .option:hover { background: #f4fcf2; }
    input[type="radio"] { accent-color: #4cae4c; width: 18px; height: 18px; }
    .option-text { font-size: 0.93rem; color: #2c482c; }
    .feedback-line { font-size: 0.75rem; margin-top: 12px; padding-left: 28px; }
    .action-bar { display: flex; flex-wrap: wrap; justify-content: space-between; margin: 2rem 0 1rem; gap: 15px; }
    button {
      background: #eef4ea; border: 1px solid #bdd6bd; padding: 10px 28px; border-radius: 60px;
      font-weight: 600; font-size: 0.85rem; color: #2e632e; cursor: pointer;
    }
    button:hover { background: #e2f0e0; }
    .btn-primary { background: #4caf50; border-color: #3e9a3e; color: white; }
    .score-panel { background: #eef8ec; border-radius: 40px; padding: 0.8rem 1.5rem; text-align: center; font-weight: 700; border: 1px solid #cbe6cb; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: #6f946f; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Listening part 1 · multiple choice</h1>
    <div class="sub">You will hear people talking in eight different situations. Choose the best answer (A, B or C).</div>
  </div>

  <!-- audio player with RELATIVE path (both files in same folder) -->
  <div class="audio-card">
    <span class="audio-label">🎵 Listening track 1.2</span>
    <audio controls preload="metadata">
      <source src="CH1_2.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <span style="font-size:0.7rem; color:#537a53;">ⓘ listen to the whole recording</span>
  </div>

  <div id="questionsContainer" class="questions-grid"></div>

  <div class="action-bar">
    <button id="checkBtn" class="btn-primary">✅ Check my answers</button>
    <button id="resetBtn">⟳ Reset all answers</button>
  </div>
  <div id="scorePanel" class="score-panel">📊 Your score: 0 / 8</div>
  <footer>🌿 listening comprehension · light green theme</footer>
</div>

<script>
  const questions = [
    { id: 1, text: "You hear two people talking about a friend of theirs. What does the woman say about the friend?", options: ["A He talks a lot about his lifestyle.", "B He leads a comfortable lifestyle.", "C He may change his lifestyle."], correct: "C He may change his lifestyle." },
    { id: 2, text: "You overhear a man talking to a friend on his phone. Why is he phoning?", options: ["A to persuade his friend to do something", "B to ask for some information", "C to change an arrangement"], correct: "C to change an arrangement" },
    { id: 3, text: "You hear a woman talking about her family's financial situation. What is she going to do?", options: ["A ask someone to help her", "B try to sell something", "C look for a new job"], correct: "B try to sell something" },
    { id: 4, text: "You hear a man talking about his job. Who is the man?", options: ["A a hotel manager", "B a hotel receptionist", "C a hotel doorman"], correct: "C a hotel doorman" },
    { id: 5, text: "You hear two people talking about the value of their time spent living abroad. What do they agree about?", options: ["A It has helped them develop their personality.", "B It has made them appreciate their own country.", "C It has given them better job prospects."], correct: "A It has helped them develop their personality." },
    { id: 6, text: "You hear a man talking on the radio. What is he doing?", options: ["A reviewing a book", "B advertising a product", "C reading a news report"], correct: "B advertising a product" },
    { id: 7, text: "You hear two people talking about the village they both live in. What does the woman think of the village?", options: ["A People are not always very friendly.", "B Some of the roads are dangerous.", "C There are not enough children."], correct: "A People are not always very friendly." },
    { id: 8, text: "You hear a man talking about a country in which he once lived. What surprised him about the people?", options: ["A the importance they give to clothes", "B the type of food they eat", "C their attitude to work"], correct: "C their attitude to work" }
  ];

  let userAnswers = new Array(8).fill("");
  const container = document.getElementById("questionsContainer");
  const checkBtn = document.getElementById("checkBtn");
  const resetBtn = document.getElementById("resetBtn");
  const scorePanel = document.getElementById("scorePanel");

  function renderQuestions() {
    container.innerHTML = "";
    questions.forEach((q, idx) => {
      const card = document.createElement("div");
      card.className = "question-card";
      card.innerHTML = `
        <div class="question-number">Question ${q.id}</div>
        <div class="question-text">${q.text}</div>
        <div class="options" id="options-${idx}"></div>
        <div class="feedback-line" id="fb_${idx}"></div>
      `;
      const optionsDiv = card.querySelector(`#options-${idx}`);
      q.options.forEach(opt => {
        const label = document.createElement("label");
        label.className = "option";
        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = `question_${idx}`;
        radio.value = opt;
        if (userAnswers[idx] === opt) radio.checked = true;
        radio.addEventListener("change", (e) => {
          if (e.target.checked) {
            userAnswers[idx] = opt;
            document.getElementById(`fb_${idx}`).innerHTML = "";
            saveToLocalStorage();
          }
        });
        const span = document.createElement("span");
        span.className = "option-text";
        span.innerText = opt;
        label.appendChild(radio);
        label.appendChild(span);
        optionsDiv.appendChild(label);
      });
      container.appendChild(card);
    });
  }

  function evaluateAndShowScore() {
    let correctCount = 0;
    for (let i = 0; i < questions.length; i++) {
      const userChoice = userAnswers[i];
      const correctAns = questions[i].correct;
      const isCorrect = (userChoice === correctAns && userChoice !== "");
      if (isCorrect) correctCount++;
      const fbDiv = document.getElementById(`fb_${i}`);
      if (fbDiv) {
        if (!userChoice || userChoice === "") {
          fbDiv.innerHTML = "❌ No answer selected";
          fbDiv.style.color = "#c0452c";
        } else if (isCorrect) {
          fbDiv.innerHTML = "✓ Correct answer";
          fbDiv.style.color = "#2a6b2a";
        } else {
          fbDiv.innerHTML = `✗ Incorrect. Correct answer: ${correctAns}`;
          fbDiv.style.color = "#c0452c";
        }
      }
    }
    scorePanel.innerHTML = `📊 Your score: ${correctCount} / ${questions.length}`;
    saveToLocalStorage();
  }

  function resetAllAnswers() {
    userAnswers.fill("");
    renderQuestions();
    for (let i = 0; i < questions.length; i++) {
      const fbDiv = document.getElementById(`fb_${i}`);
      if (fbDiv) fbDiv.innerHTML = "";
    }
    scorePanel.innerHTML = `📊 Your score: 0 / ${questions.length}`;
    saveToLocalStorage();
  }

  function saveToLocalStorage() {
    localStorage.setItem("listeningUserAnswers", JSON.stringify(userAnswers));
  }

  function loadFromLocalStorage() {
    const stored = localStorage.getItem("listeningUserAnswers");
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed) && parsed.length === questions.length) {
          userAnswers = parsed;
        }
      } catch(e) {}
    }
  }

  function init() {
    loadFromLocalStorage();
    renderQuestions();
    checkBtn.addEventListener("click", evaluateAndShowScore);
    resetBtn.addEventListener("click", resetAllAnswers);
  }

  init();
</script>
</body>
</html>
